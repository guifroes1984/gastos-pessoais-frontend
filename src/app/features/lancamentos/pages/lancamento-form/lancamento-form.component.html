<div class="container mt-4">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-header bg-white border-0 pt-4 pb-0">
            <h3 class="mb-0 fw-semibold text-primary">
                <i class="bi bi-plus-circle me-2"></i>Novo Lançamento
            </h3>
            <hr class="mt-3 mb-0">
        </div>

        <div class="card-body p-4">
            <form [formGroup]="form" (ngSubmit)="salvar()">
                <div class="mb-4">
                    <label class="form-label fw-medium text-secondary">
                        <i class="bi bi-card-text me-1"></i>Descrição
                    </label>
                    <input type="text" class="form-control form-control-lg rounded-3" formControlName="descricao"
                        placeholder="Ex: Aluguel, Salário, Conta de luz...">
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">
                            <i class="bi bi-tag me-1"></i>Tipo
                        </label>
                        <select class="form-select form-select-lg rounded-3" formControlName="tipo">
                            <option value="RECEITA">💰 Receita</option>
                            <option value="DESPESA">💸 Despesa</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">
                            <i class="bi bi-folder me-1"></i>Categoria
                        </label>
                        <select class="form-select form-select-lg rounded-3" formControlName="categoriaId">
                            <option *ngFor="let c of categorias" [ngValue]="c.id">
                                {{ c.nome }}
                            </option>
                        </select>
                    </div>
                </div>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">
                            <i class="bi bi-cash-stack me-1"></i>Valor
                        </label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 rounded-3">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-lg rounded-3"
                                formControlName="valor" placeholder="0,00">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-medium text-secondary">
                            <i class="bi bi-calendar-event me-1"></i>Data
                        </label>
                        <input type="date" class="form-control form-control-lg rounded-3" formControlName="data">
                    </div>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" (click)="form.reset()">
                        <i class="bi bi-arrow-repeat me-1"></i>Limpar
                    </button>
                    <button type="submit" class="btn btn-success px-5 rounded-pill shadow-sm" [disabled]="form.invalid">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
