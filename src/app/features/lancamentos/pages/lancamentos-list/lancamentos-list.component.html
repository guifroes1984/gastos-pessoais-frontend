<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-semibold text-primary mb-0">
      <i class="bi bi-receipt me-2"></i>Lançamentos
    </h3>
    <button class="btn btn-primary rounded-pill shadow-sm px-4" routerLink="/lancamentos/novo">
      <i class="bi bi-plus-lg me-1"></i>Novo
    </button>
  </div>
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-dark text-white">
          <tr class="text-uppercase small fw-semibold">
            <th class="py-3 ps-4">
              <i class="bi bi-card-text me-2"></i>Descrição
            </th>
            <th class="py-3">
              <i class="bi bi-tag me-2"></i>Tipo
            </th>
            <th class="py-3">
              <i class="bi bi-cash-stack me-2"></i>Valor
            </th>
            <th class="py-3 pe-4">
              <i class="bi bi-calendar-event me-2"></i>Data
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let l of lancamentos" class="border-bottom">
            <td class="py-3 ps-4 fw-medium">
              {{ l.descricao }}
            </td>
            <td class="py-3">
              <span
                [ngClass]="l.tipo === 'RECEITA' ? 'badge bg-success bg-opacity-10 text-success' : 'badge bg-danger bg-opacity-10 text-danger'"
                class="px-3 py-2 rounded-pill fw-semibold">
                <i [ngClass]="l.tipo === 'RECEITA' ? 'bi-arrow-up-circle' : 'bi-arrow-down-circle'" class="bi me-1"></i>
                {{ l.tipo === 'RECEITA' ? 'Receita' : 'Despesa' }}
              </span>
            </td>
            <td class="py-3">
              <span [ngClass]="l.tipo === 'RECEITA' ? 'text-success' : 'text-danger'" class="fw-semibold">
                {{ l.valor | currency:'BRL' }}
              </span>
            </td>
            <td class="py-3 pe-4 text-secondary">
              <i class="bi bi-calendar3 me-1"></i>
              {{ l.data | date:'dd/MM/yyyy' }}
            </td>
          </tr>
          <tr *ngIf="lancamentos.length === 0">
            <td colspan="4" class="text-center py-5 text-muted">
              <i class="bi bi-inbox fs-1 d-block mb-2"></i>
              Nenhum lançamento encontrado
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
