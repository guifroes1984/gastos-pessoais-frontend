<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-semibold text-primary mb-0">
      <i class="bi bi-tags me-2"></i>
      {{ id ? 'Editar Categoria' : 'Nova Categoria' }}
    </h3>
  </div>
  <div class="card shadow-lg border-0 rounded-4 p-4">
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome</label>
        <input type="text" class="form-control" formControlName="nome" placeholder="Digite o nome da categoria">
        <div class="text-danger mt-1" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
          Nome é obrigatório
        </div>
      </div>
      <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-outline-secondary px-4 rounded-pill" (click)="voltar()">
          <i class="bi bi-x-lg me-1"></i>Cancelar
        </button>
        <button type="submit" class="btn btn-success px-5 rounded-pill shadow-sm" [disabled]="carregando">
          <i class="bi bi-check-lg me-1"></i>
          {{ id ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </form>
  </div>
</div>
