<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-semibold text-primary mb-0">
      <i class="bi bi-tags me-2"></i>Categorias
    </h3>
    <button class="btn btn-primary rounded-pill shadow-sm px-4"
      routerLink="/categorias/nova">
      <i class="bi bi-plus-lg me-1"></i>Nova
    </button>
  </div>
  <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-dark text-white">
          <tr class="text-uppercase small fw-semibold">
            <th class="py-3 ps-4">Nome</th>
            <th class="py-3 text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="carregando">
            <td colspan="2" class="text-center py-4">
              Carregando...
            </td>
          </tr>
          <tr *ngFor="let c of categorias" class="border-bottom">
            <td class="py-3 ps-4 fw-medium">
              {{ c.nome }}
            </td>
            <td class="py-3 text-center">
              <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-sm btn-outline-primary rounded-circle"
                  [routerLink]="['/categorias/editar', c.id]"
                  title="Editar">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger rounded-circle"
                  (click)="excluir(c.id!)"
                  title="Excluir">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="!carregando && categorias.length === 0">
            <td colspan="2" class="text-center py-5 text-muted">
              <i class="bi bi-inbox fs-1 d-block mb-2"></i>
              Nenhuma categoria cadastrada
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
