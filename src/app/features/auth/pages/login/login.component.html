<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card shadow-lg border-0 p-4" style="width: 380px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Gastos Pessoais</h3>
            <p class="text-muted mb-0">Controle suas finanças</p>
        </div>
        <form [formGroup]="form" (ngSubmit)="login()">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="Digite seu email">

                <small class="text-danger" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
                    Email inválido
                </small>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" class="form-control" formControlName="senha" placeholder="Digite sua senha">

                <small class="text-danger" *ngIf="form.get('senha')?.invalid && form.get('senha')?.touched">
                    Senha obrigatória
                </small>
            </div>
            <button class="btn btn-primary w-100 mt-2" [disabled]="form.invalid">
                Entrar
            </button>
        </form>
    </div>
</div>
