<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-semibold text-primary mb-0">
      <i class="bi bi-speedometer2 me-2"></i>Dashboard
    </h2>
    <button class="btn btn-outline-danger rounded-pill shadow-sm px-4" (click)="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>Sair
    </button>
  </div>
  <div class="row g-4 mt-2">
    <div class="col-md-4">
      <div class="card border-0 shadow-lg rounded-4 h-100">
        <div class="card-body text-center p-4">
          <div class="mb-3">
            <div class="bg-success bg-opacity-10 rounded-circle p-3 d-inline-block">
              <i class="bi bi-wallet2 fs-1 text-success"></i>
            </div>
          </div>
          <h5 class="text-secondary text-uppercase small fw-semibold mb-2">Saldo Total</h5>
          <h3 class="display-6 fw-bold text-success mb-0">
            {{ saldo | currency:'BRL' }}
          </h3>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-lg rounded-4 h-100">
        <div class="card-body text-center p-4">
          <div class="mb-3">
            <div class="bg-primary bg-opacity-10 rounded-circle p-3 d-inline-block">
              <i class="bi bi-arrow-up-circle fs-1 text-primary"></i>
            </div>
          </div>
          <h5 class="text-secondary text-uppercase small fw-semibold mb-2">Total em Receitas</h5>
          <h3 class="display-6 fw-bold text-primary mb-0">
            {{ receitas | currency:'BRL' }}
          </h3>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-lg rounded-4 h-100">
        <div class="card-body text-center p-4">
          <div class="mb-3">
            <div class="bg-danger bg-opacity-10 rounded-circle p-3 d-inline-block">
              <i class="bi bi-arrow-down-circle fs-1 text-danger"></i>
            </div>
          </div>
          <h5 class="text-secondary text-uppercase small fw-semibold mb-2">Total em Despesas</h5>
          <h3 class="display-6 fw-bold text-danger mb-0">
            {{ despesas | currency:'BRL' }}
          </h3>
        </div>
      </div>
    </div>

  </div>
  <div class="row mt-4">
    <div class="col-md-5 mx-auto">
      <div class="card border-0 shadow-lg rounded-4 p-4">

        <h5 class="fw-semibold text-primary mb-3">
          <i class="bi bi-pie-chart me-2"></i>Receitas vs Despesas
        </h5>
        <div *ngIf="receitas > 0 || despesas > 0; else semDados" class="chart-container">
          <canvas baseChart
            [data]="chartData"
            [type]="'doughnut'">
          </canvas>
        </div>
        <ng-template #semDados>
          <div class="text-center text-muted py-5">
            <i class="bi bi-bar-chart fs-1 d-block mb-2"></i>
            Nenhum dado para exibir
          </div>
        </ng-template>
      </div>
    </div>
  </div>

</div>
